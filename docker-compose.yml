services:
  # Automatically generates YouTube PO tokens — solves bot-detection without cookies
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

  reclip:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - reclip-data:/app/data
    environment:
      - GETPOT_BGUTIL_BASEURL=http://pot-provider:4416
    depends_on:
      - pot-provider

volumes:
  reclip-data:
